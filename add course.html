<main>
<section class="add-course">
    <h2>Add Course</h2>

    <form>
        <label for="course-name">Course Name</label>
        <select id="course-name">
            <option value="">Choose Course</option>
            <option>Web Development</option>
            <option>Python Basics</option>
            <option>Database Systems</option>
            <option>Computer Networks</option>
            <option>Artificial Intelligence</option>
        </select>

        <label for="course-round">Course Round</label>
        <select id="course-round">
            <option value="">Choose Round</option>
            <option>First Round</option>
            <option>Second Round</option>
            <option>Summer Round</option>
        </select>

        <button type="submit">Submit</button>
    </form>
</section>
